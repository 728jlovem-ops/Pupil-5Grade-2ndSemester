<script>
    // ======================= 辅助函数：打乱数组顺序 =======================
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }
    
    // ======================= 完整题库 =======================
    const Q = [];
    function add(text, opts, correctIdx, exp) {
        Q.push({ 
            text, 
            originalOpts: [...opts], 
            originalCorrect: correctIdx,
            explanation: exp 
        });
    }
    
    function getRandomizedQuestion(q) {
        const shuffledOpts = shuffleArray([...q.originalOpts]);
        const newCorrectIdx = shuffledOpts.indexOf(q.originalOpts[q.originalCorrect]);
        return {
            text: q.text,
            options: shuffledOpts,
            correct: newCorrectIdx,
            explanation: q.explanation
        };
    }
    
    // ====================== 第1-22课 + 日积月累 (280题) ======================
    // 第1课 古诗三首 (12题)
    add("《四时田园杂兴（其三十一）》描写的是什么季节？", ["初夏","春天","秋天","冬天"],0,"描写初夏时节江南农村的田园风光。");
    add("“昼出耘田夜绩麻”中的“耘田”是什么意思？",["锄草","播种","收割","浇水"],0,"“耘田”指给田地锄草、松土。");
    add("“童孙未解供耕织”中的“未解”是什么意思？",["不懂得","不理解","未解决","未解开"],0,"“未解”意思是不懂得、不会。");
    add("《稚子弄冰》全诗突出一个什么字？",["稚","冰","乐","童"],0,"全诗突出“稚”字，表现儿童的天真可爱。");
    add("“敲成玉磬穿林响”运用了什么修辞？",["比喻","拟人","夸张","对偶"],0,"把冰块比作玉磬，运用比喻修辞。");
    add("《稚子弄冰》中的“玻璃”指什么？",["天然玉石","现在的玻璃","冰块","水晶"],0,"“玻璃”指一种天然玉石，也叫水玉。");
    add("《村晚》是一首描写什么的诗？",["山村晚景","田园风光","儿童生活","牧童放牛"],0,"描写宁静的山村晚景图。");
    add("“牧童归去横牛背”中的“横”字妙在哪里？",["形象写出牧童随意姿态","表示横着走","表示横放","表示横跨"],0,"“横”字写出牧童随意、悠闲的样子。");
    add("《四时田园杂兴》作者是谁？",["范成大","杨万里","雷震","王维"],0,"宋代诗人范成大。");
    add("《稚子弄冰》作者是谁？",["杨万里","范成大","雷震","王维"],0,"宋代诗人杨万里。");
    add("《村晚》作者是谁？",["雷震","范成大","杨万里","王维"],0,"宋代诗人雷震。");
    add("三首古诗共同的主题是什么？",["描写儿童天真可爱的形象","描写田园风光","描写劳动场面","描写乡村晚景"],0,"都描写了儿童天真可爱的形象。");
    
    // 第2课 祖父的园子 (8题)
    add("《祖父的园子》作者是谁？",["萧红","季羡林","陈慧瑛","老舍"],0,"选自萧红的《呼兰河传》。");
    add("《祖父的园子》选自萧红的哪部作品？",["《呼兰河传》","《生死场》","《小城三月》","《马伯乐》"],0,"自传体长篇小说《呼兰河传》。");
    add("祖父的园子有什么特点？",["明晃晃、新鲜漂亮","荒凉破败","整整齐齐","冷冷清清"],0,"花园明晃晃，红的红绿的绿。");
    add("《祖父的园子》表达了作者怎样的情感？",["对童年和祖父的怀念","对自由的向往","对农村生活的喜爱","对祖父的敬佩"],0,"回忆无拘无束的童年，表达对祖父的依恋。");
    add("“凡是在太阳下的，都是健康的、漂亮的”出自哪课？",["《祖父的园子》","《月是故乡明》","《梅花魂》","《呼兰河传》"],0,"表达了作者对园子里一切事物的喜爱。");
    add("祖父的园子里描写了哪些昆虫？",["蝴蝶、蜻蜓、蚂蚱、蜜蜂","蚂蚁、蜘蛛、蟋蟀","萤火虫、天牛","瓢虫、螳螂"],0,"展现园子的生机勃勃。");
    add("“拍一拍手，仿佛大树都会发出声响”运用了什么修辞？",["夸张","拟人","比喻","排比"],0,"夸张手法，写出作者对园子的喜爱。");
    add("描写蜜蜂的句子是？",["胖乎乎，圆滚滚，就像一个小毛球","轻飘飘，慢悠悠","急匆匆，忙忙碌碌","静悄悄，无声无息"],0,"形象写出蜜蜂的可爱形态。");
    
    // 第3课 月是故乡明 (8题)
    add("《月是故乡明》作者是谁？",["季羡林","萧红","陈慧瑛","老舍"],0,"季羡林先生的散文。");
    add("“月是故乡明”表达了作者怎样的情感？",["思念故乡","喜爱月亮","赞美故乡","感叹时光"],0,"表达对故乡深深的思念之情。");
    add("作者追忆了哪些童年趣事？",["数星星、捉知了、看月亮","放风筝、踢毽子","堆雪人、打雪仗","钓鱼、游泳"],0,"回忆了数星星、捉知了、看月亮等趣事。");
    add("季羡林先生认为哪里的月亮最明？",["故乡的月亮","北京的月亮","济南的月亮","外国的月亮"],0,"认为故乡的月亮最明亮。");
    add("文中作者运用了什么手法来突出故乡月亮的美？",["对比","比喻","拟人","夸张"],0,"用他乡的月亮与故乡的月亮对比。");
    add("季羡林是著名的什么家？",["语言学家、文学家","数学家","物理学家","化学家"],0,"著名语言学家、文学家。");
    add("作者在文中回忆“数星星”表现了什么？",["童年生活的情趣","对天文学的兴趣","夏天的炎热","夜晚的宁静"],0,"表现童年生活的情趣。");
    add("“月是故乡明”这句话出自哪里？",["季羡林的散文","李白的诗","杜甫的诗","苏轼的词"],0,"出自季羡林的散文。");
    
    // 第4课 梅花魂 (8题)
    add("《梅花魂》作者是谁？",["陈慧瑛","萧红","季羡林","冰心"],0,"陈慧瑛的作品。");
    add("《梅花魂》中的“魂”指的是什么？",["精神品格","灵魂","梅花香气","梅花颜色"],0,"梅花所象征的民族精神——不肯低头折节。");
    add("外祖父为什么珍爱墨梅图？",["梅花象征民族精神","梅花很漂亮","梅花很值钱","梅花是国花"],0,"梅花代表祖国，代表民族精神。");
    add("“独在异乡为异客，每逢佳节倍思亲”出自？",["王维《九月九日忆山东兄弟》","李白《静夜思》","杜甫《月夜忆舍弟》","孟郊《游子吟》"],0,"表达游子思乡之情。");
    add("中华民族有气节的人物应该具有什么精神？",["顶天立地，不肯低头折节","贪生怕死","见利忘义","阿谀奉承"],0,"不管历经多少磨难，从来都是顶天立地。");
    add("“春草明年绿，王孙归不归”出自？",["王维《山中送别》","李白《送友人》","杜甫《春夜喜雨》","孟浩然《过故人庄》"],0,"表达盼望友人归来的心情。");
    add("外祖父因“我”弄脏墨梅图而发脾气，是因为？",["梅花代表祖国，不容玷污","墨梅图很值钱","他脾气暴躁","不喜欢小孩子"],0,"梅花代表祖国，不容玷污。");
    add("外祖父送墨梅图时嘱咐“我”什么？",["要做一个有气节的中国人","要好好学习","要孝敬父母","要保重身体"],0,"希望“我”像梅花一样有气节。");
    
    // 第5课 草船借箭 (12题)
    add("《草船借箭》选自哪部名著？",["《三国演义》","《水浒传》","《西游记》","《红楼梦》"],0,"选自《三国演义》第四十六回。");
    add("《草船借箭》作者是谁？",["罗贯中","施耐庵","吴承恩","曹雪芹"],0,"元末明初罗贯中。");
    add("诸葛亮为什么能成功借到箭？",["神机妙算、知天象晓地利","运气好","曹操送箭","周瑜帮忙"],0,"他识人心、知天象、晓地利。");
    add("周瑜的性格特点是？",["嫉贤妒能","忠厚老实","谨慎多疑","神机妙算"],0,"心胸狭窄，因诸葛亮才能超过他而妒忌。");
    add("鲁肃的性格特点是？",["忠厚老实、信守承诺","心胸狭窄","谨慎多疑","神机妙算"],0,"帮助诸葛亮准备草船但替他保密。");
    add("曹操的性格特点是？",["谨慎多疑","心胸狭窄","忠厚老实","神机妙算"],0,"看到大雾中的船队不敢轻易出兵。");
    add("诸葛亮利用了哪三方面因素？",["识人心、知天象、晓地利","人多势众","曹操胆小","鲁肃帮助"],0,"利用鲁肃的忠厚、三天后的大雾、回来的顺风。");
    add("故事的起因是什么？",["周瑜妒忌诸葛亮，让他十天内造十万支箭","曹操要攻打东吴","刘备需要箭","诸葛亮想展示才能"],0,"周瑜想以此陷害诸葛亮。");
    add("诸葛亮立下军令状，答应几天内造好？",["三天","五天","七天","十天"],0,"三天内造好十万支箭。");
    add("草船借箭时利用了什么时候的天气？",["大雾漫天","大雨倾盆","大风呼啸","晴空万里"],0,"大雾让曹操看不清虚实。");
    add("诸葛亮借到箭后，周瑜说了什么？",["“诸葛亮神机妙算，我真比不上他”","“诸葛亮运气真好”","“这次算你赢了”","“我们继续比试”"],0,"周瑜自叹不如。");
    add("“既生瑜，何生亮”这句话是谁说的？",["周瑜","诸葛亮","曹操","司马懿"],0,"周瑜感叹自己的才能不如诸葛亮。");

    add("武松打虎的地点是？",["景阳冈","野猪林","十字坡","飞云浦"],0,"武松在景阳冈上打死猛虎。");

        });
        html += `</div><button id="closeModal" class="close-modal">关闭</button></div></div>`;
        document.body.insertAdjacentHTML("beforeend", html);
        let modal = document.querySelector(".modal-overlay");
        document.getElementById("redeemBtn").onclick = () => { modal.remove(); showRedeemOptions(); };
        document.querySelectorAll(".confirm-btn").forEach(btn => {
            btn.onclick = () => { let idx = parseInt(btn.dataset.idx); p.prizeList[idx].redeemed = true; save(); modal.remove(); showPointsModal(); };
        });
        document.getElementById("closeModal").onclick = () => modal.remove();
    }
    
    function showRedeemOptions() {
        let p = userProgress[currentUser.userId];
        let modal = document.createElement("div");
        modal.className = "modal-overlay";
        modal.innerHTML = `<div class="modal-card"><h3>🎁 选择奖品</h3><p>可用积分：<strong>${p.availablePoints}</strong> 分</p><div><button class="prize-btn" data-prize="薯片" data-points="100">🍟 薯片 (100分)</button><button class="prize-btn" data-prize="彩虹糖" data-points="100">🌈 彩虹糖 (100分)</button><button class="prize-btn" data-prize="辣条" data-points="100">🔥 辣条 (100分)</button></div><div><button id="cancelRedeem" class="prize-btn" style="background:#c5e0f4;">🔙 取消</button><button id="confirmRedeem" class="prize-btn" style="background:#7fc5a4;" disabled>✅ 确认并退出</button></div><p style="font-size:0.7rem; margin-top:10px;">请先选择奖品，再点击“确认并退出”</p></div>`;
        document.body.appendChild(modal);
        let selectedPrize = null, selectedPoints = null;
        modal.querySelectorAll(".prize-btn[data-prize]").forEach(btn => {
            btn.onclick = () => {
                selectedPrize = btn.dataset.prize;
                selectedPoints = parseInt(btn.dataset.points);
                modal.querySelectorAll(".prize-btn[data-prize]").forEach(b => b.style.border = "none");
                btn.style.border = "3px solid #4a9fd8";
                let confirmBtn = document.getElementById("confirmRedeem");
                confirmBtn.disabled = false;
                confirmBtn.style.background = "#4a9fd8";
                confirmBtn.style.opacity = "1";
            };
        });
        document.getElementById("confirmRedeem").onclick = () => {
            if (!selectedPrize) { alert("请先选择奖品"); return; }
            if (deductPoints(currentUser.userId, selectedPoints)) {
                p.prizeList.push({ name: selectedPrize, points: selectedPoints, date: new Date().toLocaleString(), redeemed: false });
                save();
                if (typeof confetti === 'function') confetti({ particleCount: 100, spread: 60 });
                alert(`🎉 兑换 ${selectedPrize} 成功！请告诉家长确认兑现~`);
                modal.remove();
                p.deferredRedeem = false;
                save();
                showPointsModal();
            } else alert(`积分不足！当前可用积分：${p.availablePoints} 分`);
        };
        document.getElementById("cancelRedeem").onclick = () => modal.remove();
    }
    
    let appRoot = document.getElementById("root");
    
    function renderLogin() {
        appRoot.innerHTML = `<div class="app-container"><div class="login-card"><div class="cover-title"><div class="title-icon">📚</div><div class="title-text">语文期末闯关大冒险</div><div class="title-sub">22课+日积月累 | 280题带解析 | 选项随机</div></div><div class="input-group"><label>姓名</label><input id="loginName" class="input-field" placeholder="输入名字"></div><div class="input-group"><label>学号</label><input id="loginId" class="input-field" placeholder="输入学号"></div><button id="doLogin" class="login-btn">登录闯关</button><div class="footer-note">📀 答题记录永久保存 | 点击⭐积分可兑换奖品</div></div></div>`;
        document.getElementById("doLogin").onclick = () => {
            let name = document.getElementById("loginName").value.trim(), uid = document.getElementById("loginId").value.trim();
            let user = usersDB.find(u => u.username === name && u.userId === uid);
            if (user) { currentUser = user; user.role === "admin" ? renderAdmin() : renderMap(); }
            else alert("账号不存在，请联系管理员");
        };
    }
    
    function renderAdmin() {
        let html = `<div class="app-container"><div class="header-bar"><span>👑 管理员 ${currentUser.username}</span><button id="adminLogout" class="logout-text-btn">退出登录</button></div><div class="admin-panel"><h3>📊 学生进度</h3>`;
        for (let u of usersDB.filter(u => u.role === 'student')) {
            let p = userProgress[u.userId];
            let total = p.totalEarned || 0;
            let available = p.availablePoints || 0;
            let completed = p.levelCompleted.filter(v => v === true).length;
            html += `<div class="user-row"><span>🧸 ${u.username} (${u.userId})</span><span>🏆累计${total} ⭐可用${available} | 通关${completed}/${levels.length}</span><button class="viewDetail" data-id="${u.userId}">详情</button></div>`;
        }
        html += `<div class="new-user-form"><input id="newName" placeholder="姓名"><input id="newId" placeholder="学号"><button id="createUser">➕ 开新户</button></div>
        <div class="backup-panel"><button id="exportBtn" class="backup-btn">📤 导出备份</button><button id="clearBtn" class="backup-btn danger-btn">⚠️ 清除数据</button></div>
        <button id="adminBack" class="backup-btn">返回登录</button></div></div>`;
        appRoot.innerHTML = html;
        document.querySelectorAll(".viewDetail").forEach(btn => btn.onclick = () => { let uid = btn.dataset.id; let p = userProgress[uid]; let msg = `🎓 ${usersDB.find(u=>u.userId===uid)?.username}\n累计获得:${p.totalEarned} 可用积分:${p.availablePoints}\n`; for(let i=0;i<levels.length;i++)msg+=`${levels[i].name}: ${p.levelStats[i]?.score||0}分 ${p.levelCompleted[i]?"✅":"🔒"}\n`; alert(msg); });
        document.getElementById("createUser").onclick = () => {
            let nn = document.getElementById("newName").value.trim(), nid = document.getElementById("newId").value.trim();
            if (!nn || !nid) return alert("完整填写");
            if (usersDB.find(u => u.userId === nid)) return alert("学号已存在");
            usersDB.push({ username: nn, userId: nid, role: "student" });
            userProgress[nid] = { totalEarned: 0, availablePoints: 0, randomTotal: 0, wrongMap: {}, levelStats: {}, levelCompleted: new Array(levels.length).fill(false), prizeList: [], deferredRedeem: false };
            for (let i = 0; i < levels.length; i++) userProgress[nid].levelStats[i] = { score: 0, correctIds: [], wrongIds: [] };
            save(); renderAdmin();
        };
        document.getElementById("exportBtn").onclick = () => { let data = localStorage.getItem(STORAGE_KEY); let blob = new Blob([data], {type:"application/json"}); let a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `语文备份_${new Date().toISOString().slice(0,19)}.json`; a.click(); URL.revokeObjectURL(blob.url); alert("✅ 导出成功"); };
        document.getElementById("clearBtn").onclick = () => { if(confirm("清除所有数据？")){ localStorage.removeItem(STORAGE_KEY); location.reload(); } };
        document.getElementById("adminLogout").onclick = () => { currentUser = null; renderLogin(); };
        document.getElementById("adminBack").onclick = () => renderLogin();
    }
    
    function renderMap() {
        let p = userProgress[currentUser.userId];
        let wrongCount = Object.keys(p.wrongMap || {}).length;
        let html = `<div class="app-container"><div class="header-bar"><span class="user-badge">🐣 ${currentUser.username}</span><span class="score-badge" id="scoreBtn">⭐ ${p.availablePoints || 0}</span><span class="wrong-badge">📖 错题 ${wrongCount}</span><button id="mapLogout" class="logout-text-btn">退出登录</button></div><div class="level-grid" id="levelGrid">`;
        for (let i = 0; i < levels.length; i++) {
            let lvl = levels[i];
            let completed = p.levelCompleted[i];
            let lvlScore = p.levelStats[i]?.score || 0;
            let locked = (i > 0 && !p.levelCompleted[i - 1]);
            html += `<div class="level-card ${completed?'completed':''} ${locked?'locked':''}" data-level="${i}"><div class="level-name">${lvl.name}</div><div class="level-score">🏅 ${lvlScore}</div><div>${completed?'✅':locked?'🔒':'🔓'}</div></div>`;
        }
        html += `</div><div style="padding:0 20px 20px; display:flex; gap:12px;"><button id="randomBtn" class="backup-btn" style="flex:1;">🎲 随机综合</button><button id="wrongBtn" class="backup-btn" style="flex:1;">📘 错题特训</button></div></div>`;
        appRoot.innerHTML = html;
        document.querySelectorAll(".level-card").forEach(card => card.onclick = () => { let lvl = parseInt(card.dataset.level); if(lvl>0 && !userProgress[currentUser.userId].levelCompleted[lvl-1]) { alert("请先通关前一关"); return; } startLevel(lvl); });
        document.getElementById("mapLogout").onclick = () => { currentUser = null; renderLogin(); };
        document.getElementById("randomBtn").onclick = () => startRandom();
        document.getElementById("wrongBtn").onclick = () => startWrongTrain();
        document.getElementById("scoreBtn").onclick = () => showPointsModal();
    }
    
    function startLevel(lvlIdx) {
        let level = levels[lvlIdx];
        let p = userProgress[currentUser.userId];
        let stat = p.levelStats[lvlIdx];
        let available = level.questionIds.filter(qid => !stat.correctIds.includes(qid));
        if (available.length === 0 && stat.correctIds.length === level.questionIds.length) { alert("本关已满分通关！"); return; }
        currentLevel = lvlIdx;
        currentQuestions = available.map(qid => {
            let originalQ = Q[qid];
            return { qid, data: getRandomizedQuestion(originalQ) };
        });
        currentQIdx = 0; levelLock = false;
        renderLevelQuiz();
    }
    
    function renderLevelQuiz() {
        if (currentQIdx >= currentQuestions.length) {
            let p = userProgress[currentUser.userId];
            if (p.levelStats[currentLevel].correctIds.length === levels[currentLevel].questionIds.length) {
                p.levelCompleted[currentLevel] = true; save();
                alert(`🎉 通关${levels[currentLevel].name}！`);
            }
            renderMap(); return;
        }
        let item = currentQuestions[currentQIdx], q = item.data;
        let p = userProgress[currentUser.userId], stat = p.levelStats[currentLevel];
        let html = `<div class="app-container"><div class="header-bar"><span>📖 ${levels[currentLevel].name}</span><span>⭐ 本关:${stat.score}</span><button id="exitLvl" class="logout-text-btn">返回地图</button></div><div class="quiz-area"><div class="question-text">${q.text}</div><div class="options" id="optsDiv"></div><div class="feedback" id="fbDiv">答对+2分，答错-1分</div><button class="next-btn" id="nextBtn">下一题</button></div></div>`;
        appRoot.innerHTML = html;
        let optsDiv = document.getElementById("optsDiv");
        q.options.forEach((opt, idx) => { let div = document.createElement("div"); div.className = "option"; div.innerHTML = `${String.fromCharCode(65+idx)}. ${opt}`; div.onclick = () => handleLevelAnswer(idx, item.qid); optsDiv.appendChild(div); });
        document.getElementById("nextBtn").onclick = () => { if (!levelLock) alert("请先答题"); else { currentQIdx++; levelLock = false; renderLevelQuiz(); } };
        document.getElementById("exitLvl").onclick = () => renderMap();
        
        function handleLevelAnswer(selected, qid) {
            if (levelLock) return;
            let qq = Q[qid];
            let originalCorrect = qq.originalCorrect;
            let originalOpts = qq.originalOpts;
            let selectedOriginal = q.options[selected];
            let isCorrect = (selectedOriginal === originalOpts[originalCorrect]);
            let stat2 = userProgress[currentUser.userId].levelStats[currentLevel];
            let fb = document.getElementById("fbDiv");
            if (isCorrect) {
                if (!stat2.correctIds.includes(qid)) {
                    let add = 2;
                    if (stat2.wrongIds.includes(qid)) { add = 2; stat2.wrongIds = stat2.wrongIds.filter(id => id !== qid); removeWrong(currentUser.userId, qid); }
                    stat2.score += add; stat2.correctIds.push(qid);
                    addLevelPoints(currentUser.userId, add);
                    fb.innerHTML = `✅ 答对！ +${add}分<br>📖 ${qq.explanation}`;
                } else fb.innerHTML = `✅ 本题已得过积分<br>📖 ${qq.explanation}`;
            } else {
                if (!stat2.correctIds.includes(qid) && !stat2.wrongIds.includes(qid)) {
                    stat2.score -= 1; stat2.wrongIds.push(qid);
                    deductLevelPoints(currentUser.userId, 1);
                    addWrong(currentUser.userId, qid);
                    fb.innerHTML = `❌ 答错 -1分<br>正确答案：${originalOpts[originalCorrect]}<br>📖 ${qq.explanation}<br>⚠️ 已加入错题本`;
                } else fb.innerHTML = `❌ 正确答案：${originalOpts[originalCorrect]}<br>📖 ${qq.explanation}`;
            }
            levelLock = true; save();
            let sb = document.getElementById("scoreBtn");
            if (sb) sb.innerText = `⭐ ${userProgress[currentUser.userId].availablePoints || 0}`;
        }
    }
    
    function startRandom() {
        let shuffled = [...Array(Q.length).keys()];
        for (let i = shuffled.length - 1; i > 0; i--) { let j = Math.floor(Math.random() * (i + 1)); [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]]; }
        trainingList = shuffled.slice(0, 10).map(idx => {
            let originalQ = Q[idx];
            return { qid: idx, data: getRandomizedQuestion(originalQ), originalQ: originalQ };
        });
        trainingPos = 0; trainingLock = false; trainingCombo = 0; trainingIsWrong = false;
        renderTrain();
    }
    
    function startWrongTrain() {
        let p = userProgress[currentUser.userId];
        let wrongIds = Object.keys(p.wrongMap || {}).map(Number);
        if (wrongIds.length === 0) { alert("错题本空空如也！"); return; }
        trainingList = wrongIds.map(qid => {
            let originalQ = Q[qid];
            return { qid: qid, data: getRandomizedQuestion(originalQ), originalQ: originalQ };
        });
        trainingPos = 0; trainingLock = false; trainingCombo = 0; trainingIsWrong = true;
        renderTrain();
    }
    
    function renderTrain() {
        if (trainingPos >= trainingList.length) { alert("训练完成！积分已更新"); renderMap(); return; }
        let item = trainingList[trainingPos], q = item.data;
        let html = `<div class="app-container"><div class="header-bar"><span>📖 特训 ${trainingPos+1}/${trainingList.length}</span><button id="exitTrain" class="logout-text-btn">返回地图</button></div><div class="quiz-area"><div class="question-text">${q.text}</div><div class="options" id="trainOpts"></div><div class="feedback" id="trainFeed">${trainingIsWrong ? '错题答对+3分，不扣分' : '每题+1分，连对3次额外+5'}</div><button class="next-btn" id="trainNext">下一题</button></div></div>`;
        appRoot.innerHTML = html;
        let optsDiv = document.getElementById("trainOpts");
        q.options.forEach((opt, idx) => { let div = document.createElement("div"); div.className = "option"; div.innerHTML = `${String.fromCharCode(65+idx)}. ${opt}`; div.onclick = () => handleTrainAnswer(idx, item.qid); optsDiv.appendChild(div); });
        document.getElementById("trainNext").onclick = () => { if (!trainingLock) alert("请先答题"); else { trainingPos++; trainingLock = false; renderTrain(); } };
        document.getElementById("exitTrain").onclick = () => renderMap();
        
        function handleTrainAnswer(selected, qid) {
            if (trainingLock) return;
            let originalQ = Q[qid];
            let originalOpts = originalQ.originalOpts;
            let originalCorrect = originalQ.originalCorrect;
            let selectedOriginal = q.options[selected];
            let isCorrect = (selectedOriginal === originalOpts[originalCorrect]);
            let fb = document.getElementById("trainFeed");
            if (isCorrect) {
                let add = trainingIsWrong ? 3 : 1;
                let msg = "";
                if (trainingIsWrong && isWrong(currentUser.userId, qid)) { add = 3; removeWrong(currentUser.userId, qid); msg = "✅ 错题答对+3分！移出错题本"; }
                else if (!trainingIsWrong) { trainingCombo++; if (trainingCombo >= 3 && trainingCombo % 3 === 0) { add += 5; msg = `🎉 正确！+${add}分 (连对奖励)`; } else msg = `✅ 正确 +${add}分`; }
                else msg = `✅ 正确 +${add}分`;
                addPoints(currentUser.userId, add);
                fb.innerHTML = `${msg}<br>📖 ${originalQ.explanation}`;
            } else {
                trainingCombo = 0;
                if (!trainingIsWrong && !isWrong(currentUser.userId, qid)) addWrong(currentUser.userId, qid);
                fb.innerHTML = `❌ 正确答案：${originalOpts[originalCorrect]}<br>📖 ${originalQ.explanation}${!trainingIsWrong ? '<br>⚠️ 已加入错题本' : ''}`;
            }
            trainingLock = true; save();
            let sb = document.getElementById("scoreBtn");
            if (sb) sb.innerText = `⭐ ${userProgress[currentUser.userId].availablePoints || 0}`;
        }
    }
    
    initData();
    renderLogin();
    let scr = document.createElement("script"); scr.src = "https://cdn.jsdelivr.net/npm/canvas-confetti@1"; document.head.appendChild(scr);
</script>
</body>
</html>
