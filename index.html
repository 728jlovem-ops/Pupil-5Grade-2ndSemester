    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        .app-container { max-width: 550px; width: 100%; background: #f0f8ff; border-radius: 40px; box-shadow: 0 20px 35px rgba(0,0,0,0.1); overflow: hidden; }

<div id="root"></div>

<script>
    // ======================= 完整题库：22课 + 日积月累 + 专项，每题带解析 =======================
    const questionBank = [];
    function addQA(text, opts, correctIdx, explanation) {
        questionBank.push({ text, options: opts, correct: correctIdx, explanation: explanation });
    }
    
    // ====================== 第1课《古诗三首》 18题 ======================
    addQA("《四时田园杂兴（其三十一）》描写的是什么季节的景象？", ["初夏", "春天", "秋天", "冬天"], 0, "这首诗描写了初夏时节江南农村的田园风光。诗中“昼出耘田夜绩麻”描写的是夏季农忙时的劳动场景。");
    addQA("“昼出耘田夜绩麻”中的“耘田”是什么意思？", ["锄草", "播种", "收割", "浇水"], 0, "“耘田”在古代指给田地锄草、松土。这句诗的意思是：白天出去锄草，晚上回来搓麻线。");
    addQA("“童孙未解供耕织，也傍桑阴学种瓜”中的“傍”字是什么意思？", ["靠近", "旁边", "傍晚", "依傍"], 0, "“傍”在这里是“靠近”的意思。“也傍桑阴学种瓜”意思是：也靠近桑树荫下学着种瓜。");
    addQA("《四时田园杂兴》中“村庄儿女各当家”的“儿女”指的是？", ["农家男女", "小孩子", "儿子女儿", "年轻人"], 0, "这里的“儿女”指农家男女，意思是村庄里的男男女女各自主持家务、从事农活。");
    addQA("下列哪句诗描写了农忙时节男女老少一起忙碌的景象？", ["昼出耘田夜绩麻，村庄儿女各当家", "童孙未解供耕织，也傍桑阴学种瓜", "昼出耘田夜绩麻，童孙未解供耕织", "村庄儿女各当家，也傍桑阴学种瓜"], 0, "“昼出耘田夜绩麻，村庄儿女各当家”写出了农忙时节男女老少各自忙碌的景象。");
    addQA("《四时田园杂兴（其三十一）》表达了诗人怎样的情感？", ["对劳动人民的赞美", "对儿童的喜爱", "对田园风光的赞美", "对夏天的喜爱"], 0, "这首诗描写了乡村中农人耘田、绩麻，以及儿童学着大人的样子种瓜的情景，表达了对劳动人民的赞美之情。");
    addQA("《稚子弄冰》全诗突出一个什么字？", ["稚", "冰", "乐", "童"], 0, "全诗突出一个“稚”字，描写了小孩子天真可爱、自得其乐的童趣。");
    addQA("“敲成玉磬穿林响，忽作玻璃碎地声”运用了什么修辞手法？", ["比喻", "拟人", "夸张", "对偶"], 0, "这两句运用了比喻的修辞手法，把冰块比作玉磬和玻璃，生动形象地写出了敲击冰块的声音。");
    addQA("《稚子弄冰》中的“玻璃”指的是什么？", ["一种天然玉石", "现在的玻璃", "冰块", "水晶"], 0, "这里的“玻璃”指一种天然玉石，也叫水玉，不是现在所说的玻璃。");
    addQA("《村晚》是一首描写什么的诗？", ["山村晚景", "田园风光", "儿童生活", "牧童放牛"], 0, "《村晚》描写了一幅宁静的山村晚景图，展示了牧童骑牛晚归的生活情趣。");
    addQA("“牧童归去横牛背，短笛无腔信口吹”中的“腔”是什么意思？", ["曲调", "口腔", "腔调", "空腔"], 0, "“腔”在这里指曲调，“信口吹”就是随口吹，没有固定的曲调。");
    addQA("下列诗句中，描写儿童学种瓜情景的是？", ["童孙未解供耕织，也傍桑阴学种瓜", "稚子金盆脱晓冰，彩丝穿取当银钲", "牧童归去横牛背，短笛无腔信口吹", "昼出耘田夜绩麻，村庄儿女各当家"], 0, "“童孙未解供耕织，也傍桑阴学种瓜”描写了儿童学着大人的样子种瓜的情景。");
    addQA("《村晚》中“山衔落日浸寒漪”的“衔”字妙在哪里？", ["形象写出山好像含着太阳", "表示山很高", "表示落日很快", "形容山势险峻"], 0, "“衔”字运用拟人手法，形象地写出了山好像含着太阳的样子，生动有趣。");
    addQA("《四时田园杂兴》的作者是？", ["范成大", "杨万里", "雷震", "王维"], 0, "《四时田园杂兴》是宋代诗人范成大的作品，描写了农村四季的田园风光。");
    addQA("《稚子弄冰》的作者是？", ["杨万里", "范成大", "雷震", "王维"], 0, "《稚子弄冰》是宋代诗人杨万里的作品，描写了儿童玩冰的童趣。");
    addQA("《村晚》的作者是？", ["雷震", "范成大", "杨万里", "王维"], 0, "《村晚》是宋代诗人雷震的作品，描写了山村晚景和牧童的形象。");
    addQA("“昼出耘田夜绩麻”中的“绩麻”是什么意思？", ["搓麻线", "织布", "种麻", "收割麻"], 0, "“绩麻”指把麻搓成线。这句诗写出了农家男女日夜忙碌的劳作情景。");
    addQA("三首古诗共同的主题是什么？", ["描写儿童天真可爱的形象", "描写田园风光", "描写劳动场面", "描写乡村晚景"], 0, "三首古诗都描写了儿童天真可爱的形象：《四时田园杂兴》中学种瓜的儿童，《稚子弄冰》中玩冰的儿童，《村晚》中吹笛的牧童。");
    
    // ====================== 第2课《祖父的园子》 12题 ======================
    addQA("《祖父的园子》作者是谁？", ["萧红", "季羡林", "陈慧瑛", "老舍"], 0, "《祖父的园子》选自萧红的自传体长篇小说《呼兰河传》。萧红是中国现代著名女作家。");
    addQA("《祖父的园子》选自萧红的哪部作品？", ["《呼兰河传》", "《生死场》", "《小城三月》", "《马伯乐》"], 0, "《祖父的园子》选自萧红的自传体长篇小说《呼兰河传》。");
    addQA("在《祖父的园子》中，园子里有什么特点？", ["明晃晃、新鲜漂亮", "荒凉破败", "整整齐齐", "冷冷清清"], 0, "文中描写“花园里边明晃晃的，红的红，绿的绿”，园子里的景物新鲜漂亮。");
    addQA("《祖父的园子》表达了作者怎样的情感？", ["对童年和祖父的怀念", "对自由的向往", "对农村生活的喜爱", "对祖父的敬佩"], 0, "文章回忆了“我”在园子里无拘无束的童年生活，表达了对祖父深沉的热爱与依恋。");
    addQA("“凡是在太阳下的，都是健康的、漂亮的”这句话出自哪篇课文？", ["《祖父的园子》", "《月是故乡明》", "《梅花魂》", "《呼兰河传》"], 0, "这句话出自《祖父的园子》，表达了作者对园子里一切事物的喜爱。");
    addQA("《祖父的园子》中，作者回忆了在园子里的什么生活？", ["无拘无束的童年生活", "辛苦劳作的农活", "读书学习的日子", "与伙伴玩耍的情景"], 0, "作者在园子里可以自由自在地玩耍，度过了一个无拘无束的童年。");
    addQA("祖父的园子里，作者描写了哪些昆虫？", ["蝴蝶、蜻蜓、蚂蚱、蜜蜂", "蚂蚁、蜘蛛、蟋蟀", "萤火虫、天牛", "瓢虫、螳螂"], 0, "文中描写了蝴蝶、蜻蜓、蚂蚱、蜜蜂等昆虫，展现了园子的生机勃勃。");
    addQA("《祖父的园子》中“花园里边明晃晃的，红的红，绿的绿”写出了什么？", ["园子的鲜艳漂亮", "园子很大", "园子很热闹", "园子很安静"], 0, "这句话写出了园子里色彩鲜艳、美丽漂亮的特点。");
    addQA("“拍一拍手，仿佛大树都会发出声响”运用了什么修辞手法？", ["夸张", "拟人", "比喻", "排比"], 0, "这句话运用了夸张的修辞手法，写出了作者对园子的喜爱之情。");
    addQA("《祖父的园子》中，作者描写蜜蜂的句子是？", ["胖乎乎，圆滚滚，就像一个小毛球", "轻飘飘，慢悠悠", "急匆匆，忙忙碌碌", "静悄悄，无声无息"], 0, "“胖乎乎，圆滚滚，就像一个小毛球”生动形象地写出了蜜蜂的可爱形态。");
    addQA("祖父的园子给作者的童年带来了什么？", ["快乐和自由", "压力和负担", "孤独和寂寞", "知识和道理"], 0, "祖父的园子是作者童年的乐园，给她带来了快乐和自由。");
    addQA("在《祖父的园子》中，“我”和祖父的关系是怎样的？", ["亲密无间", "疏远冷淡", "敬畏尊重", "平等友好"], 0, "祖父非常疼爱“我”，经常陪伴“我”在园子里玩耍，祖孙关系亲密无间。");
    
    // ====================== 第3课《月是故乡明》 8题 ======================
    addQA("《月是故乡明》作者是谁？", ["季羡林", "萧红", "陈慧瑛", "老舍"], 0, "《月是故乡明》是季羡林先生的散文，表达了对故乡的深深思念。");
    addQA("“月是故乡明”表达了作者怎样的情感？", ["思念故乡", "喜爱月亮", "赞美故乡", "感叹时光"], 0, "这句话表达了作者对故乡深深的思念之情，认为故乡的月亮是最明亮的。");
    addQA("作者在文中追忆了哪些童年趣事？", ["数星星、捉知了、看月亮", "放风筝、踢毽子、捉迷藏", "堆雪人、打雪仗、滑冰", "钓鱼、游泳、爬山"], 0, "文中作者回忆了数星星、捉知了、看月亮等童年趣事，表达了对童年生活的怀念。");
    addQA("季羡林先生认为哪里的月亮最明？", ["故乡的月亮", "北京的月亮", "济南的月亮", "外国的月亮"], 0, "季羡林先生认为故乡的月亮是最明亮的，因为那里有他童年的美好回忆。");
    addQA("“独在异乡为异客，每逢佳节倍思亲”这句诗与哪篇课文表达的情感相似？", ["《月是故乡明》", "《祖父的园子》", "《梅花魂》", "《草船借箭》"], 0, "这句诗表达了游子思乡之情，与《月是故乡明》表达的思念故乡的情感相似。");
    addQA("季羡林是著名的什么家？", ["语言学家、文学家", "数学家", "物理学家", "化学家"], 0, "季羡林是著名的语言学家、文学家，在语言学和文化研究方面有很高成就。");
    addQA("文中作者为什么要提到在济南、北京和世界其他地方见到的月亮？", ["用对比突出故乡月亮的美", "说明外国的月亮更圆", "展示他去过很多地方", "表达对城市的喜爱"], 0, "作者用对比的手法，拿其他地方见到的月亮与故乡的月亮对比，突出故乡月亮的美。");
    addQA("作者在文中回忆的“数星星”表现了什么？", ["童年生活的情趣", "对天文学的兴趣", "夏天的炎热", "夜晚的宁静"], 0, "“数星星”表现了作者童年生活的情趣和对故乡的美好回忆。");
    
    // ====================== 第4课《梅花魂》 12题 ======================
    addQA("《梅花魂》作者是谁？", ["陈慧瑛", "萧红", "季羡林", "冰心"], 0, "《梅花魂》是陈慧瑛的作品，通过梅花歌颂了中华民族的气节。");
    addQA("《梅花魂》中的“魂”指的是什么？", ["精神品格", "灵魂", "梅花香气", "梅花颜色"], 0, "“魂”在这里指梅花所象征的民族精神和品格——不管历经多少磨难，都不肯低头折节。");
    addQA("外祖父为什么珍爱墨梅图？", ["因为梅花象征民族精神", "因为梅花很漂亮", "因为梅花很值钱", "因为梅花是国花"], 0, "外祖父珍爱墨梅图，是因为梅花象征中华民族的精神，代表着他眷恋祖国的情感。");

    function initData() {

            let prog = userProgress[uid];
            if (!prog.levelStats) prog.levelStats = {};

            }
            if (!prog.levelCompleted) prog.levelCompleted = new Array(levels.length).fill(false);
            if (prog.randomTotalScore === undefined) prog.randomTotalScore = 0;

        }
        saveToLocal();
    }
    
    function createDefaultData() {
        usersDB = [

    function saveToLocal() { localStorage.setItem(STORAGE_KEY, JSON.stringify({ users: usersDB, progress: userProgress })); }
    
    function updateTotalPoints(userId) {

        if (prog.levelStats) for (let lvl in prog.levelStats) total += prog.levelStats[lvl].score || 0;
        prog.totalPoints = total;
        saveToLocal();
        if (prog.totalPoints >= 100 && !prizeModalOpen) showPrizeModal(userId);
        return total;
    }

        let html = `<div class="app-container"><div class="header-bar"><span>📖 ${levels[currentLevel].name}</span><span>⭐ 本关:${levelStat.score}</span><button id="exitLvl" class="logout-text-btn">返回地图</button></div><div class="quiz-area"><div class="question-text">${q.text}</div><div class="options" id="lvlOpts"></div><div class="feedback" id="lvlFeed">答对+2分，答错-1分</div><button class="next-btn" id="lvlNext">下一题</button></div></div>`;
        appRoot.innerHTML = html;
        let optsDiv = document.getElementById("lvlOpts");
        q.options.forEach((opt, idx) => {
            let div = document.createElement("div"); div.className = "option";
            div.innerHTML = `${String.fromCharCode(65 + idx)}. ${opt}`;
            div.addEventListener("click", () => handleLevelAnswer(idx, item.qid));
            optsDiv.appendChild(div);
        });
        document.getElementById("lvlNext").onclick = () => { if (!levelAnsweredLock) alert("请先答题"); else { currentQuestionIndex++; levelAnsweredLock = false; renderLevelQuestion(); } };
        document.getElementById("exitLvl").onclick = () => renderLevelMap();
        
        function handleLevelAnswer(selected, qid) {
            if (levelAnsweredLock) return;
            let qq = questionBank[qid];
            let correct = (selected === qq.correct);
            let stat = userProgress[currentUser.userId].levelStats[currentLevel];
            let fb = document.getElementById("lvlFeed");
            if (correct) {
                if (!stat.correctQIds.includes(qid)) {
                    let add = 2;
                    if (stat.wrongLocalIds.includes(qid)) { add = 2; stat.wrongLocalIds = stat.wrongLocalIds.filter(id => id !== qid); }
                    stat.score += add; stat.correctQIds.push(qid);
                    fb.innerHTML = `✅ 答对！ +${add}分`;
                    updateTotalPoints(currentUser.userId);
                } else fb.innerHTML = "✅ 本题已得过积分";
            } else {
                if (!stat.correctQIds.includes(qid) && !stat.wrongLocalIds.includes(qid)) {
                    stat.score -= 1; stat.wrongLocalIds.push(qid);
                    fb.innerHTML = `❌ 答错 -1分<br><strong>正确答案：${qq.options[qq.correct]}</strong><br>📖 解析：${qq.explanation}`;
                    updateTotalPoints(currentUser.userId);
                } else fb.innerHTML = `❌ 正确答案：${qq.options[qq.correct]}<br>📖 解析：${qq.explanation}`;
            }
            levelAnsweredLock = true;
            saveToLocal();
        }
    }
    
    function startRandomMode() {
        let shuffled = [...Array(questionBank.length).keys()];
        for (let i = shuffled.length - 1; i > 0; i--) { let j = Math.floor(Math.random() * (i + 1)); [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]]; }
        trainingQuestions = shuffled.slice(0, 10).map(idx => ({ qid: idx, data: questionBank[idx] }));
        trainingIdx = 0; trainingAnsweredLock = false; trainingCombo = 0; trainingIsWrong = false;
        renderTraining();
    }
    
    function startWrongSetTraining() {
        let prog = userProgress[currentUser.userId];
        let wrongIds = Object.keys(prog.wrongSetMap || {}).map(Number);
        if (wrongIds.length === 0) { alert("错题本空空如也！"); return; }
        trainingQuestions = wrongIds.map(qid => ({ qid, data: questionBank[qid] }));
        trainingIdx = 0; trainingAnsweredLock = false; trainingCombo = 0; trainingIsWrong = true;
        renderTraining();
    }
    
    function renderTraining() {
        if (trainingIdx >= trainingQuestions.length) { alert(`🎉 训练完成！积分已更新`); renderLevelMap(); return; }
        let item = trainingQuestions[trainingIdx];
        let q = item.data;
        let html = `<div class="app-container"><div class="header-bar"><span>📖 特训 ${trainingIdx + 1}/${trainingQuestions.length}</span><button id="exitTrain" class="logout-text-btn">返回地图</button></div><div class="quiz-area"><div class="question-text">${q.text}</div><div class="options" id="trainOpts"></div><div class="feedback" id="trainFeed">${trainingIsWrong ? '错题答对+3分，不扣分' : '每题+1分，连对3次额外+5'}</div><button class="next-btn" id="trainNext">下一题</button></div></div>`;
        appRoot.innerHTML = html;
        let optsDiv = document.getElementById("trainOpts");
        q.options.forEach((opt, idx) => {
            let div = document.createElement("div"); div.className = "option";
            div.innerHTML = `${String.fromCharCode(65 + idx)}. ${opt}`;
            div.addEventListener("click", () => handleTrainingAnswer(idx, item.qid));
            optsDiv.appendChild(div);
        });
        document.getElementById("trainNext").onclick = () => { if (!trainingAnsweredLock) alert("请先作答"); else { trainingIdx++; trainingAnsweredLock = false; renderTraining(); } };
        document.getElementById("exitTrain").onclick = () => renderLevelMap();
        
        function handleTrainingAnswer(selected, qid) {
            if (trainingAnsweredLock) return;
            let qq = questionBank[qid];
            let correct = (selected === qq.correct);
            let prog = userProgress[currentUser.userId];
            let fb = document.getElementById("trainFeed");
            if (correct) {
                let add = trainingIsWrong ? 3 : 1;
                if (trainingIsWrong && isInWrongSet(currentUser.userId, qid)) { add = 3; removeFromWrongSet(currentUser.userId, qid); fb.innerHTML = `✅ 错题答对+3分！移出错题本<br>📖 解析：${qq.explanation}`; }
                else if (!trainingIsWrong) { trainingCombo++; if (trainingCombo >= 3 && trainingCombo % 3 === 0) { add += 5; fb.innerHTML = `🎉 正确！+${add}分 (连对奖励)<br>📖 解析：${qq.explanation}`; } else fb.innerHTML = `✅ 正确 +${add}分<br>📖 解析：${qq.explanation}`; }
                else fb.innerHTML = `✅ 正确 +${add}分<br>📖 解析：${qq.explanation}`;
                prog.randomTotalScore = (prog.randomTotalScore || 0) + add;
                updateTotalPoints(currentUser.userId);
            } else {
                trainingCombo = 0;
                if (!trainingIsWrong && !isInWrongSet(currentUser.userId, qid)) addToWrongSet(currentUser.userId, qid);
                fb.innerHTML = `❌ 正确答案：${qq.options[qq.correct]}<br>📖 解析：${qq.explanation}${!trainingIsWrong ? '<br>⚠️ 本题已加入错题本' : ''}`;
            }
            trainingAnsweredLock = true;
            saveToLocal();
        }
    }
    
    initData();
    renderLogin();
    let script = document.createElement("script"); script.src = "https://cdn.jsdelivr.net/npm/canvas-confetti@1"; document.head.appendChild(script);
</script>
</body>
</html>
