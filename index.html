    function initData() {

            try { let data = JSON.parse(stored); usersDB = data.users || []; userProgress = data.progress || {}; } catch(e) { createDefaultData(); }

            let prog = userProgress[uid];
            if (!prog.levelStats) prog.levelStats = {};

            }
            if (!prog.levelCompleted) prog.levelCompleted = new Array(levels.length).fill(false);
            if (prog.randomTotalScore === undefined) prog.randomTotalScore = 0;
            if (!prog.wrongSetMap) prog.wrongSetMap = {};
        }
        saveToLocal();
    }
    
    function createDefaultData() {
        usersDB = [

            for (let i = 0; i < levels.length; i++) {

    function saveToLocal() { localStorage.setItem(STORAGE_KEY, JSON.stringify({ users: usersDB, progress: userProgress })); }
    
    function updateTotalPoints(userId) {
        let prog = userProgress[userId];
        let total = (prog.randomTotalScore || 0);
        if (prog.levelStats) for (let lvl in prog.levelStats) total += prog.levelStats[lvl].score || 0;
        prog.totalPoints = total;
        saveToLocal();
        if (prog.totalPoints >= 100 && !prizeModalOpen) showPrizeModal(userId);
        return total;
    }

    function showUserDetail(uid) {
        let prog = userProgress[uid];
        let total = updateTotalPoints(uid);
        let msg = `🎓 ${usersDB.find(u => u.userId === uid)?.username} 总分:${total}\n`;

    function renderLevelMap() {
        let prog = userProgress[currentUser.userId];
        let totalPoints = updateTotalPoints(currentUser.userId);
        let wrongCount = Object.keys(prog.wrongSetMap || {}).length;
        let html = `<div class="app-container"><div class="header-bar"><span class="user-badge">🐣 ${currentUser.username}</span><span class="score-badge">⭐ ${totalPoints}</span><span class="wrong-badge">📖 错题 ${wrongCount}</span><button id="mapLogout" class="logout-text-btn">退出登录</button></div><div class="level-grid" id="levelGrid">`;
        for (let i = 0; i < levels.length; i++) {
            let lvl = levels[i];
            let completed = prog.levelCompleted[i];
            let lvlScore = prog.levelStats[i]?.score || 0;
            let locked = (i > 0 && !prog.levelCompleted[i - 1]);
            html += `<div class="level-card ${completed ? 'completed' : ''} ${locked ? 'locked' : ''}" data-level="${i}"><div class="level-name">${lvl.name}</div><div class="level-score">🏅 ${lvlScore}</div><div style="font-size:0.6rem;">${completed ? '✅' : locked ? '🔒' : '🔓'}</div></div>`;
        }
        html += `</div><div style="padding:0 20px 20px; display:flex; gap:12px;"><button id="randomBtn" style="background:#c5e0f4;border:none;border-radius:40px;padding:10px;flex:1;">🎲 随机综合</button><button id="wrongBtn" style="background:#ffd9b5;border:none;border-radius:40px;padding:10px;flex:1;">📘 错题特训</button></div></div>`;

        });

        document.getElementById("wrongBtn")?.addEventListener("click", () => startWrongSetTraining());

    function startLevel(lvlIdx) {
        let level = levels[lvlIdx];
        let prog = userProgress[currentUser.userId];
        let levelStat = prog.levelStats[lvlIdx];
        let available = level.questionIds.filter(qid => !levelStat.correctQIds.includes(qid));
        if (available.length === 0 && levelStat.correctQIds.length === level.questionIds.length) { alert("🎉 本关已满分通关！"); return; }
        currentLevel = lvlIdx;
        currentQuestions = available.map(qid => ({ qid, data: questionBank[qid] }));
        currentQuestionIndex = 0;
        levelAnsweredLock = false;
        renderLevelQuestion();
    }
    
    function renderLevelQuestion() {
        if (currentQuestionIndex >= currentQuestions.length) {
            let prog = userProgress[currentUser.userId];
            if (prog.levelStats[currentLevel].correctQIds.length === levels[currentLevel].questionIds.length) {
                prog.levelCompleted[currentLevel] = true;
                saveToLocal();
                alert(`🎉 恭喜通关${levels[currentLevel].name}！`);
            }
            renderLevelMap(); return;
        }
        let item = currentQuestions[currentQuestionIndex];
        let q = item.data;
        let prog = userProgress[currentUser.userId];
        let levelStat = prog.levelStats[currentLevel];
        let html = `<div class="app-container"><div class="header-bar"><span>📖 ${levels[currentLevel].name}</span><span>⭐ 本关:${levelStat.score}</span><button id="exitLvl" class="logout-text-btn">返回地图</button></div><div class="quiz-area"><div class="question-text">${q.text}</div><div class="options" id="lvlOpts"></div><div class="feedback" id="lvlFeed">答对+2分，答错-1分</div><button class="next-btn" id="lvlNext">下一题</button></div></div>`;
        appRoot.innerHTML = html;
        let optsDiv = document.getElementById("lvlOpts");
        q.options.forEach((opt, idx) => {
            let div = document.createElement("div"); div.className = "option";
            div.innerHTML = `${String.fromCharCode(65 + idx)}. ${opt}`;
            div.addEventListener("click", () => handleLevelAnswer(idx, item.qid));
            optsDiv.appendChild(div);
        });
        document.getElementById("lvlNext").onclick = () => { if (!levelAnsweredLock) alert("请先答题"); else { currentQuestionIndex++; levelAnsweredLock = false; renderLevelQuestion(); } };
        document.getElementById("exitLvl").onclick = () => renderLevelMap();
        
        function handleLevelAnswer(selected, qid) {
            if (levelAnsweredLock) return;
            let qq = questionBank[qid];
            let correct = (selected === qq.correct);
            let stat = userProgress[currentUser.userId].levelStats[currentLevel];
            let fb = document.getElementById("lvlFeed");
            if (correct) {
                if (!stat.correctQIds.includes(qid)) {
                    let add = 2;
                    if (stat.wrongLocalIds.includes(qid)) { add = 2; stat.wrongLocalIds = stat.wrongLocalIds.filter(id => id !== qid); }
                    stat.score += add; stat.correctQIds.push(qid);
                    fb.innerHTML = `✅ 答对！ +${add}分`;
                    updateTotalPoints(currentUser.userId);
                } else fb.innerHTML = "✅ 本题已得过积分";
            } else {
                if (!stat.correctQIds.includes(qid) && !stat.wrongLocalIds.includes(qid)) {
                    stat.score -= 1; stat.wrongLocalIds.push(qid);
                    fb.innerHTML = `❌ 答错 -1分，正确答案：${qq.options[qq.correct]}`;
                    updateTotalPoints(currentUser.userId);
                } else fb.innerHTML = `❌ 正确答案：${qq.options[qq.correct]}`;
            }
            levelAnsweredLock = true;
            saveToLocal();
        }
    }
    
    function startRandomMode() {
        let shuffled = [...Array(questionBank.length).keys()];
        for (let i = shuffled.length - 1; i > 0; i--) { let j = Math.floor(Math.random() * (i + 1)); [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]]; }
        trainingQuestions = shuffled.slice(0, 10).map(idx => ({ qid: idx, data: questionBank[idx] }));
        trainingIdx = 0; trainingAnsweredLock = false; trainingCombo = 0; trainingIsWrong = false;
        renderTraining();
    }
    
    function startWrongSetTraining() {
        let prog = userProgress[currentUser.userId];
        let wrongIds = Object.keys(prog.wrongSetMap || {}).map(Number);
        if (wrongIds.length === 0) { alert("错题本空空如也！"); return; }
        trainingQuestions = wrongIds.map(qid => ({ qid, data: questionBank[qid] }));
        trainingIdx = 0; trainingAnsweredLock = false; trainingCombo = 0; trainingIsWrong = true;
        renderTraining();
    }
    
    function renderTraining() {
        if (trainingIdx >= trainingQuestions.length) { alert(`🎉 训练完成！积分已更新`); renderLevelMap(); return; }
        let item = trainingQuestions[trainingIdx];
        let q = item.data;
        let html = `<div class="app-container"><div class="header-bar"><span>📖 特训 ${trainingIdx + 1}/${trainingQuestions.length}</span><button id="exitTrain" class="logout-text-btn">返回地图</button></div><div class="quiz-area"><div class="question-text">${q.text}</div><div class="options" id="trainOpts"></div><div class="feedback" id="trainFeed">${trainingIsWrong ? '错题答对+3分，不扣分' : '每题+1分，连对3次额外+5'}</div><button class="next-btn" id="trainNext">下一题</button></div></div>`;
        appRoot.innerHTML = html;
        let optsDiv = document.getElementById("trainOpts");
        q.options.forEach((opt, idx) => {
            let div = document.createElement("div"); div.className = "option";
            div.innerHTML = `${String.fromCharCode(65 + idx)}. ${opt}`;
            div.addEventListener("click", () => handleTrainingAnswer(idx, item.qid));
            optsDiv.appendChild(div);
        });
        document.getElementById("trainNext").onclick = () => { if (!trainingAnsweredLock) alert("请先作答"); else { trainingIdx++; trainingAnsweredLock = false; renderTraining(); } };
        document.getElementById("exitTrain").onclick = () => renderLevelMap();
        
        function handleTrainingAnswer(selected, qid) {
            if (trainingAnsweredLock) return;
            let qq = questionBank[qid];
            let correct = (selected === qq.correct);
            let prog = userProgress[currentUser.userId];
            let fb = document.getElementById("trainFeed");
            if (correct) {
                let add = trainingIsWrong ? 3 : 1;
                if (trainingIsWrong && isInWrongSet(currentUser.userId, qid)) { add = 3; removeFromWrongSet(currentUser.userId, qid); fb.innerHTML = "✅ 错题答对+3分！移出错题本"; }
                else if (!trainingIsWrong) { trainingCombo++; if (trainingCombo >= 3 && trainingCombo % 3 === 0) { add += 5; fb.innerHTML = `🎉 正确！+${add}分 (连对奖励)`; } else fb.innerHTML = `✅ 正确 +${add}分`; }
                else fb.innerHTML = `✅ 正确 +${add}分`;
                prog.randomTotalScore = (prog.randomTotalScore || 0) + add;
                updateTotalPoints(currentUser.userId);
            } else {
                trainingCombo = 0;
                if (!trainingIsWrong && !isInWrongSet(currentUser.userId, qid)) addToWrongSet(currentUser.userId, qid);
                fb.innerHTML = `❌ 正确答案：${qq.options[qq.correct]} ${!trainingIsWrong ? '已加入错题本' : ''}`;
            }
            trainingAnsweredLock = true;
            saveToLocal();
        }
    }
    
    initData();
    renderLogin();
    let script = document.createElement("script"); script.src = "https://cdn.jsdelivr.net/npm/canvas-confetti@1"; document.head.appendChild(script);
</script>
</body>
</html>
